<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <h2>Create Account</h2>
      <div class="alert alert-error" id="errMsg"></div>
      <div class="alert alert-success" id="okMsg"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="min 6 chars" />
      </div>
      <button class="btn btn-primary" onclick="handleRegister()">Register</button>
      <div class="link-text">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function handleRegister() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      hideAlerts();
      try {
        const res = await api.register({ name, email, password });
        localStorage.setItem("token", res.data.token);
        localStorage.setItem("user", JSON.stringify(res.data.user));
        showAlert("okMsg", "Registered! Redirecting...");
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);
      } catch (err) {
        showAlert("errMsg", err.message || "Registration failed");
      }
    }

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = "block";
    }
    function hideAlerts() {
      document.getElementById("errMsg").style.display = "none";
      document.getElementById("okMsg").style.display = "none";
    }
  </script>
</body>
</html>
